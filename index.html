<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Routines</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f5f5f7; --white:#fff; --yellow:#F5C800; --yellow-light:#FFFBE6;
      --yellow-mid:rgba(245,200,0,0.18); --dark:#2D2D3A; --gray:#9A9AB0;
      --gray-light:#EDEDF2; --border:#E5E5EC; --danger:#FF4D4D; --radius:20px; --radius-sm:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:80px;overflow-x:hidden;}

    /* HEADER */
    .header{background:var(--white);padding:22px 22px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .header h1{font-size:22px;font-weight:900;letter-spacing:-0.3px;}
    .header-date{font-size:12px;color:var(--gray);font-weight:700;background:var(--gray-light);padding:5px 10px;border-radius:20px;}

    /* NAV */
    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;}
    .nav button{flex:1;background:none;border:none;color:var(--gray);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;}
    .nav button.active{color:var(--yellow);}
    .nav button svg{width:22px;height:22px;}
    .nav-ind{width:18px;height:3px;border-radius:2px;background:var(--yellow);opacity:0;transition:opacity 0.2s;}
    .nav button.active .nav-ind{opacity:1;}

    /* PAGES */
    .page{display:none;}
    .page.active{display:block;animation:fadeIn 0.22s ease;}

    /* HOME */
    .home-hero{background:var(--dark);margin:16px 16px 0;border-radius:var(--radius);padding:22px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
    .home-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--yellow);opacity:0.12;}
    .home-hero h2{font-size:17px;font-weight:900;color:white;line-height:1.35;margin-bottom:5px;}
    .home-hero p{font-size:12px;color:rgba(255,255,255,0.5);font-weight:600;}
    .hero-emoji{font-size:46px;}

    .section-label{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:1px;padding:20px 22px 10px;}
    .routine-list{display:flex;flex-direction:column;gap:10px;padding:0 16px;}

    /* ADD FAB — big yellow + */
    .fab-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px 20px;}
    .fab-hint{font-size:14px;color:var(--gray);font-weight:600;margin-bottom:28px;text-align:center;line-height:1.6;}
    .fab{width:72px;height:72px;border-radius:50%;background:var(--yellow);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(245,200,0,0.45);transition:transform 0.15s;}
    .fab:active{transform:scale(0.92);}
    .fab svg{width:32px;height:32px;color:var(--dark);}

    /* ROUTINE CARD */
    .routine-card{background:var(--white);border-radius:var(--radius);padding:16px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);animation:slideUp 0.3s ease both;transition:transform 0.15s;}
    .routine-card:active{transform:scale(0.98);}
    .routine-icon{width:48px;height:48px;border-radius:14px;background:var(--yellow-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-right:12px;border:1.5px solid rgba(245,200,0,0.3);}
    .routine-info{flex:1;min-width:0;}
    .routine-info h3{font-size:15px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .routine-info p{font-size:12px;font-weight:600;color:var(--gray);}
    .routine-actions{display:flex;gap:6px;align-items:center;margin-left:8px;}
    .btn-run{background:var(--dark);color:white;border:none;border-radius:50px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:transform 0.15s;}
    .btn-run:active{transform:scale(0.93);}
    .btn-icon{background:var(--gray-light);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);}
    .btn-icon.edit:active{background:var(--yellow-light);color:var(--yellow);}
    .btn-icon.del:active{background:rgba(255,77,77,0.1);color:var(--danger);}

    /* EMPTY */
    .empty{text-align:center;padding:40px 30px 16px;}
    .empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
    .empty p{font-size:14px;color:var(--gray);font-weight:600;line-height:1.6;}

    /* ── BOTTOM SHEET ───────────────────────── */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .sheet-overlay.open{opacity:1;pointer-events:all;}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:26px 26px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.32,1,.5,1);max-height:92vh;display:flex;flex-direction:column;}
    .sheet.open{transform:translateY(0);}
    .sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
    .sheet-header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
    .sheet-title{font-size:17px;font-weight:900;}
    .sheet-close{background:var(--gray-light);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--gray);font-weight:700;}
    .sheet-body{overflow-y:auto;flex:1;padding:0 20px 30px;}

    /* FORM inside sheet */
    .form-label{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;display:block;}
    .name-input{width:100%;background:var(--gray-light);border:2px solid transparent;border-radius:var(--radius-sm);padding:14px 16px;color:var(--dark);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;transition:border-color 0.2s;}
    .name-input:focus{border-color:var(--yellow);background:var(--white);}
    .name-input::placeholder{color:var(--gray);font-weight:600;}

    /* STEPS in sheet */
    .steps-list{display:flex;flex-direction:column;gap:8px;}
    .step-item{background:var(--gray-light);border-radius:var(--radius-sm);padding:11px 12px;display:flex;gap:8px;align-items:center;transition:opacity 0.2s,box-shadow 0.2s;animation:slideUp 0.2s ease both;}
    .step-item.dragging{opacity:0.35;}
    .step-item.drag-over{box-shadow:0 0 0 2.5px var(--yellow);}
    .drag-handle{cursor:grab;color:var(--gray);flex-shrink:0;display:flex;align-items:center;touch-action:none;}
    .drag-handle svg{width:15px;height:15px;}
    .step-num{background:var(--yellow-light);color:#a07800;font-size:11px;font-weight:900;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .step-item input[type="text"]{flex:1;background:none;border:none;color:var(--dark);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;min-width:0;}
    .step-item input[type="text"]::placeholder{color:var(--gray);font-weight:600;}

    /* DURATION PILL — tap to open picker */
    .dur-pill{background:var(--white);border:none;border-radius:20px;padding:5px 11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--dark);cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .dur-pill:active{background:var(--yellow-light);}

    .btn-add-step{width:100%;background:var(--yellow-light);border:2px dashed var(--yellow);border-radius:var(--radius-sm);color:#a07800;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:13px;cursor:pointer;margin-top:10px;margin-bottom:14px;}
    .btn-primary{width:100%;background:var(--dark);color:white;border:none;border-radius:50px;padding:17px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:opacity 0.2s;margin-bottom:10px;}
    .btn-primary:active{opacity:0.85;}

    /* ── SCROLL TIME PICKER ─────────────────── */
    .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
    .picker-overlay.open{opacity:1;pointer-events:all;}
    .picker-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:26px 26px 0 0;z-index:301;padding:16px 0 36px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.32,1,.5,1);}
    .picker-sheet.open{transform:translateY(0);}
    .picker-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
    .picker-title{text-align:center;font-size:16px;font-weight:900;margin-bottom:20px;}
    .picker-cols{display:flex;align-items:center;justify-content:center;gap:0;position:relative;}
    /* selection highlight */
    .picker-cols::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:86%;height:52px;border-radius:14px;background:var(--gray-light);pointer-events:none;}
    .picker-col{display:flex;flex-direction:column;align-items:center;width:72px;}
    .picker-col-label{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:4px;text-transform:lowercase;}
    .picker-scroll{height:260px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-ms-overflow-style:none;position:relative;}
    .picker-scroll::-webkit-scrollbar{display:none;}
    .picker-item{height:52px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:var(--gray);scroll-snap-align:center;transition:color 0.15s,font-size 0.15s;}
    .picker-item.selected{color:var(--dark);font-size:30px;}
    /* padding spacers */
    .picker-spacer{height:104px;flex-shrink:0;}
    .picker-sep{font-size:26px;font-weight:900;color:var(--dark);margin:0 4px;padding-top:8px;}
    .picker-btns{display:flex;gap:10px;padding:20px 20px 0;}
    .picker-cancel{flex:1;background:var(--gray-light);color:var(--dark);border:none;border-radius:50px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
    .picker-done{flex:1;background:var(--dark);color:white;border:none;border-radius:50px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}

    /* ── SUGGESTIONS SHEET ──────────────────── */
    .sug-input-row{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);}
    .sug-emoji{font-size:22px;}
    .sug-name-input{flex:1;background:none;border:none;color:var(--dark);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;}
    .sug-name-input::placeholder{color:var(--gray);}
    .sug-dur-btn{background:var(--gray-light);border:none;border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--dark);cursor:pointer;white-space:nowrap;}

    .cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 20px;scrollbar-width:none;flex-shrink:0;}
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{background:var(--gray-light);border:none;border-radius:50px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--gray);cursor:pointer;white-space:nowrap;transition:background 0.2s,color 0.2s;flex-shrink:0;}
    .cat-tab.active{background:var(--dark);color:white;}

    .sug-list{overflow-y:auto;flex:1;padding:0 20px 30px;}
    .sug-item{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);}
    .sug-icon{width:44px;height:44px;border-radius:13px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sug-info{flex:1;min-width:0;}
    .sug-info h4{font-size:14px;font-weight:800;margin-bottom:3px;}
    .sug-info p{font-size:12px;color:var(--gray);font-weight:600;line-height:1.4;}
    .sug-dur{font-size:13px;font-weight:800;color:var(--gray);margin-right:8px;flex-shrink:0;}
    .sug-add-btn{width:34px;height:34px;border-radius:50%;background:var(--gray-light);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--dark);flex-shrink:0;transition:background 0.2s;}
    .sug-add-btn:active{background:var(--yellow);color:var(--dark);}

    /* ── RUNNER ─────────────────────────────── */
    .runner-wrap{background:var(--white);min-height:calc(100vh - 80px);display:flex;flex-direction:column;align-items:center;padding:20px 20px 40px;}
    .runner-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .runner-badge{background:var(--gray-light);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--gray);}
    .runner-close-btn{background:var(--gray-light);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--gray);font-weight:700;}
    .runner-title{font-size:26px;font-weight:900;color:var(--dark);text-align:center;line-height:1.2;margin:18px 0 4px;}
    .runner-subtitle{font-size:13px;color:var(--gray);font-weight:600;margin-bottom:28px;}
    .timer-outer{position:relative;width:260px;height:260px;margin-bottom:28px;}
    .timer-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:var(--yellow);opacity:0.12;animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.10;}50%{transform:translate(-50%,-50%) scale(1.12);opacity:0.22;}}
    .timer-svg-wrap{position:absolute;top:0;left:0;width:100%;height:100%;}
    .timer-svg-wrap svg{transform:rotate(-90deg);}
    .t-bg{fill:none;stroke:var(--gray-light);stroke-width:12;}
    .t-prog{fill:none;stroke:var(--yellow);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 8px rgba(245,200,0,0.55));}
    .timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:180px;}
    .timer-emoji-bg{width:70px;height:70px;background:var(--gray-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:32px;animation:bob 3s ease-in-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    .timer-digits{font-size:46px;font-weight:900;color:var(--dark);letter-spacing:-2px;line-height:1;}
    .timer-dur-pill{display:inline-block;background:var(--gray-light);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:var(--gray);margin-top:5px;}
    .runner-controls{display:flex;gap:28px;align-items:center;justify-content:center;margin-bottom:28px;}
    .ctrl-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--gray);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;transition:transform 0.15s;}
    .ctrl-btn:active{transform:scale(0.88);}
    .ctrl-disk{width:60px;height:60px;border-radius:50%;background:var(--gray-light);display:flex;align-items:center;justify-content:center;}
    .ctrl-disk.main{width:72px;height:72px;background:var(--dark);color:white;box-shadow:0 4px 16px rgba(45,45,58,0.25);}
    .ctrl-disk svg{width:24px;height:24px;}
    .ctrl-disk.main svg{width:28px;height:28px;}
    .prog-dots{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;}
    .prog-dot{width:9px;height:9px;border-radius:50%;background:var(--border);transition:all 0.35s cubic-bezier(.34,1.56,.64,1);}
    .prog-dot.done{background:var(--yellow);transform:scale(1.1);}
    .prog-dot.current{background:var(--dark);transform:scale(1.35);box-shadow:0 0 0 3px var(--yellow-mid);}
    .completion-wrap{background:var(--white);min-height:calc(100vh - 80px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
    .completion-wrap .big-icon{font-size:80px;margin-bottom:8px;animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;}
    .completion-wrap .confetti{font-size:32px;animation:spin 0.8s ease both 0.3s;}
    @keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
    @keyframes spin{from{transform:rotate(-180deg) scale(0);}to{transform:rotate(0) scale(1);}}
    .completion-wrap h2{font-size:30px;font-weight:900;color:var(--dark);margin:16px 0 10px;}
    .completion-wrap p{font-size:15px;color:var(--gray);font-weight:600;margin-bottom:40px;line-height:1.7;}

    /* CALENDAR */
    .cal-wrap{padding:16px 16px 0;}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    .cal-nav h2{font-size:20px;font-weight:900;}
    .cal-arrow{background:var(--gray-light);border:none;color:var(--dark);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:800;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px;}
    .cal-day-lbl{text-align:center;font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;padding:2px 0 8px;}
    .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;font-weight:700;color:var(--gray);}
    .cal-day.has-num{color:var(--dark);}
    .cal-day.completed{background:var(--yellow);color:var(--dark);font-weight:900;animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1) both;}
    .cal-day.today{border:2.5px solid var(--dark);}
    .cal-day.empty{visibility:hidden;}
    .cal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
    .stat-card{background:var(--white);border-radius:var(--radius-sm);padding:16px 10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
    .stat-val{font-size:30px;font-weight:900;color:var(--dark);line-height:1;margin-bottom:4px;}
    .stat-val .y{color:var(--yellow);}
    .stat-lbl{font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;}
    .cal-log{display:flex;flex-direction:column;gap:8px;padding-bottom:20px;}
    .log-item{background:var(--white);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.05);animation:slideUp 0.25s ease both;}
    .log-left{display:flex;align-items:center;gap:12px;}
    .log-icon{width:38px;height:38px;border-radius:11px;background:var(--yellow-light);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .log-name{font-size:14px;font-weight:800;color:var(--dark);}
    .log-date{font-size:11px;color:var(--gray);font-weight:600;margin-top:2px;}
    .log-badge{background:var(--yellow-light);color:#a07800;font-size:11px;font-weight:800;padding:5px 11px;border-radius:20px;}

    @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1 id="page-title">My Routines</h1>
  <div class="header-date" id="date-display"></div>
</div>

<!-- HOME PAGE -->
<div class="page active" id="home-page">
  <div class="home-hero">
    <div><h2>Ready to build<br/>habits? 💪</h2><p>Press ▶ Run to start any routine</p></div>
    <div class="hero-emoji">🌅</div>
  </div>
  <div class="section-label">Your Routines</div>
  <div class="routine-list" id="routine-list"></div>
</div>

<!-- RUNNER PAGE -->
<div class="page" id="runner-page"><div id="runner-content"></div></div>

<!-- CALENDAR PAGE -->
<div class="page" id="calendar-page">
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
      <h2 id="cal-month-label"></h2>
      <button class="cal-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-stats" id="cal-stats"></div>
    <div class="section-label" style="padding-left:0">Recent Completions</div>
    <div class="cal-log" id="cal-log"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="active" onclick="showPage('home')" id="nav-home">
    <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    Home<div class="nav-ind"></div>

      {name:'Gaze at the sky',dur:120,emoji:'🌤',desc:'Soak up some sunlight.'},
      {name:'Organize your space',dur:600,emoji:'🧹',desc:'Tidying is therapeutic.'},
      {name:'Listen to music',dur:1800,emoji:'🎵',desc:'Let music lift your mood.'},
      {name:'Reflect on your day',dur:300,emoji:'💭',desc:'Let go of low-priority things.'},

    ],
  };

  const EMOJIS=['🌅','💪','🏃','🧘','☕','📚','💧','🍳','🎯','🌿','⚡','🎵','🛏','🚿','✍️','🔥','🌙','⭐'];
  const STEP_EMOJIS=['⏱','🏃','💧','📝','🧘','🍳','📚','💪','🌅','🎯','🛏','🚿','☕','🥗','🎵','🔥','🌙','⭐'];

  function save()  { localStorage.setItem('routines',    JSON.stringify(routines)); }
  function saveC() { localStorage.setItem('completions', JSON.stringify(completions)); }

  // ── NAV ──────────────────────────────────────────
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(page+'-page').classList.add('active');
    document.getElementById('nav-'+page)?.classList.add('active');
    const titles={home:'My Routines',runner:'Running',calendar:'Progress'};
    document.getElementById('page-title').textContent=titles[page]||'';
    if(page==='home')     renderRoutines();
    if(page==='calendar') renderCalendar();
  }

  // ── HOME ─────────────────────────────────────────
  function renderRoutines() {
    const list=document.getElementById('routine-list');
    if(!routines.length){
      list.innerHTML=`
        <div class="empty">
          <svg width="120" height="90" viewBox="0 0 120 90" fill="none" style="margin-bottom:16px">
            <ellipse cx="60" cy="80" rx="38" ry="7" fill="#EDEDF2"/>
            <rect x="28" y="14" width="64" height="58" rx="12" fill="#EDEDF2"/>
            <rect x="36" y="24" width="48" height="6" rx="3" fill="#D5D5E0"/>
            <rect x="36" y="36" width="34" height="6" rx="3" fill="#D5D5E0"/>
            <rect x="36" y="48" width="40" height="6" rx="3" fill="#D5D5E0"/>
          </svg>
          <h3>No routines yet</h3>
          <p>Tap <b>New</b> below to create<br/>your first routine.</p>
        </div>
        <div class="fab-wrap">
          <div class="fab-hint">Tap the button to add<br/>your first routine</div>
          <button class="fab" onclick="openNewRoutineSheet()">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>`;
      return;
    }
    list.innerHTML=routines.map((r,i)=>{
      const total=r.steps.reduce((s,st)=>s+(st.durationSecs||60),0);
      const m=Math.round(total/60);
      const ts=total<60?`${total}s`:m<60?`${m} min`:`${(m/60).toFixed(1)} hr`;
      return `
        <div class="routine-card">
          <div class="routine-icon">${r.emoji||'🌟'}</div>
          <div class="routine-info"><h3>${r.name}</h3><p>${r.steps.length} steps · ${ts}</p></div>
          <div class="routine-actions">
            <button class="btn-run" onclick="startRoutine(${i})">▶ Run</button>
            <button class="btn-icon edit" onclick="editRoutine(${i})">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon del" onclick="deleteRoutine(${i})">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </div>`;
    }).join('');
    // Always show FAB at bottom too
    list.innerHTML+=`
      <div style="display:flex;justify-content:center;padding:24px 0 8px">
        <button class="fab" onclick="openNewRoutineSheet()">
          <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>`;
  }

  // ── ROUTINE SHEET ────────────────────────────────
  function openNewRoutineSheet() {
    editingIndex=null;
    document.getElementById('sheet-title').textContent='New Routine';
    document.getElementById('save-btn').textContent='Save Routine';
    document.getElementById('routine-name').value='';
    document.getElementById('steps-list').innerHTML='';
    addStep();
    document.getElementById('routine-overlay').classList.add('open');
    document.getElementById('routine-sheet').classList.add('open');
    document.getElementById('nav-add').classList.add('active');
  }

  function closeRoutineSheet() {
    document.getElementById('routine-overlay').classList.remove('open');
    document.getElementById('routine-sheet').classList.remove('open');
    document.getElementById('nav-add').classList.remove('active');
  }

  function editRoutine(i) {
    editingIndex=i;
    const r=routines[i];
    document.getElementById('sheet-title').textContent='Edit Routine';
    document.getElementById('save-btn').textContent='Update Routine';
    document.getElementById('routine-name').value=r.name;
    document.getElementById('steps-list').innerHTML='';
    r.steps.forEach(st=>addStep(st.name,st.durationSecs||60));
    document.getElementById('routine-overlay').classList.add('open');
    document.getElementById('routine-sheet').classList.add('open');
  }

  // ── STEP BUILDER ─────────────────────────────────
  function addStep(prefillName='', prefillSecs=60) {
    const list=document.getElementById('steps-list');
    const idx=list.children.length+1;
    const div=document.createElement('div');
    div.className='step-item';
    div.draggable=true;
    div.dataset.secs=prefillSecs;
    div.innerHTML=`
      <div class="drag-handle"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5h.01M9 12h.01M9 19h.01M15 5h.01M15 12h.01M15 19h.01"/></svg></div>
      <div class="step-num">${idx}</div>
      <input type="text" placeholder="Step name…" value="${prefillName}"/>
      <button class="dur-pill" onclick="openPickerForStep(this)">${secsToLabel(prefillSecs)}</button>
      <button class="btn-icon del" onclick="removeStep(this)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>`;
    div.addEventListener('dragstart',e=>{dragSrc=div;setTimeout(()=>div.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    div.addEventListener('dragend',()=>{div.classList.remove('dragging');document.querySelectorAll('.step-item').forEach(el=>el.classList.remove('drag-over'));renumberSteps();});
    div.addEventListener('dragover',e=>{e.preventDefault();if(div!==dragSrc)div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc&&dragSrc!==div){
        const l=document.getElementById('steps-list'),items=[...l.children];
        const si=items.indexOf(dragSrc),ti=items.indexOf(div);
        if(si<ti)l.insertBefore(dragSrc,div.nextSibling);else l.insertBefore(dragSrc,div);
      }
      div.classList.remove('drag-over');
    });
    list.appendChild(div);
  }

  function renumberSteps(){document.querySelectorAll('.step-num').forEach((el,i)=>el.textContent=i+1);}
  function removeStep(btn){btn.closest('.step-item').remove();renumberSteps();}

  function saveRoutine() {
    const name=document.getElementById('routine-name').value.trim();
    if(!name){alert('Please enter a routine name.');return;}
    const steps=[];
    document.querySelectorAll('.step-item').forEach(el=>{
      const n=el.querySelector('input[type="text"]').value.trim();
      const s=parseInt(el.dataset.secs)||60;
      if(!n) return;
      const m=Math.round(s/60);
      steps.push({name:n,durationSecs:s,displayDur:s<60?s:m,displayUnit:s<60?'sec':'min'});
    });
    if(!steps.length){alert('Please add at least one step.');return;}
    const emoji=editingIndex!==null?(routines[editingIndex].emoji||pickEmoji()):pickEmoji();
    if(editingIndex!==null) routines[editingIndex]={name,steps,emoji};
    else routines.push({name,steps,emoji});
    save(); closeRoutineSheet(); renderRoutines();
  }

  function deleteRoutine(i){if(confirm(`Delete "${routines[i].name}"?`)){routines.splice(i,1);save();renderRoutines();}}
  function pickEmoji(){return EMOJIS[Math.floor(Math.random()*EMOJIS.length)];}

  // ── SUGGESTIONS SHEET ────────────────────────────
  let sugNewSecs=60;

  function openSugSheet() {
    renderCatTabs(); renderSugList();
    document.getElementById('sug-overlay').classList.add('open');
    document.getElementById('sug-sheet').classList.add('open');
    document.getElementById('sug-custom-name').value='';
    sugNewSecs=60;
    document.getElementById('sug-dur-btn').textContent=secsToLabel(sugNewSecs);
  }
  function closeSugSheet(){
    document.getElementById('sug-overlay').classList.remove('open');
    document.getElementById('sug-sheet').classList.remove('open');
  }
  function openPickerForNew(){
    openPicker(sugNewSecs,secs=>{sugNewSecs=secs;document.getElementById('sug-dur-btn').textContent=secsToLabel(secs);});
  }

  function renderCatTabs(){
    const cats=Object.keys(SUGGESTIONS);
    document.getElementById('cat-tabs').innerHTML=cats.map(c=>`
      <button class="cat-tab ${c===activeCat?'active':''}" onclick="setActiveCat('${c}')">${c}</button>`).join('');
  }
  function setActiveCat(cat){activeCat=cat;renderCatTabs();renderSugList();}

  function renderSugList(){
    const items=SUGGESTIONS[activeCat]||[];
    document.getElementById('sug-list').innerHTML=items.map((s,i)=>`
      <div class="sug-item">
        <div class="sug-icon">${s.emoji}</div>
        <div class="sug-info"><h4>${s.name}</h4><p>${s.desc}</p></div>
        <div class="sug-dur">${secsToLabel(s.dur)}</div>
        <button class="sug-add-btn" onclick="addSugStep(${i})">＋</button>
      </div>`).join('');
  }

  function addSugStep(i){
    const s=SUGGESTIONS[activeCat][i];
    // Also add custom name if typed
    const customName=document.getElementById('sug-custom-name').value.trim();
    if(customName){
      addStep(customName,sugNewSecs);
      document.getElementById('sug-custom-name').value='';
    }
    addStep(s.name,s.dur);
    closeSugSheet();
  }

  // Also allow adding custom task from sug sheet
  document.getElementById('sug-sheet').addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const n=document.getElementById('sug-custom-name').value.trim();
      if(n){addStep(n,sugNewSecs);document.getElementById('sug-custom-name').value='';closeSugSheet();}
    }
  });

  // ── SCROLL TIME PICKER ───────────────────────────
  function secsToLabel(s){
    if(s<60) return `${s}s`;
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0) return sec>0?`${h}h${m}m${sec}s`:m>0?`${h}h${m}m`:`${h}h`;
    return sec>0?`${m}m${sec}s`:`${m}m`;
  }

  function buildPickerCol(el, count, pad=false){
    el.innerHTML='<div class="picker-spacer"></div>'+
      Array.from({length:count},(_,i)=>`<div class="picker-item">${pad?String(i).padStart(2,'0'):i}</div>`).join('')+
      '<div class="picker-spacer"></div>';
  }

  function initPicker(){
    buildPickerCol(document.getElementById('pick-h'),24,false);
    buildPickerCol(document.getElementById('pick-m'),60,true);
    buildPickerCol(document.getElementById('pick-s'),60,true);
    // highlight selected on scroll
    ['pick-h','pick-m','pick-s'].forEach(id=>{
      const el=document.getElementById(id);
      el.addEventListener('scroll',()=>highlightCol(el));
    });
  }

  function highlightCol(el){
    const items=el.querySelectorAll('.picker-item');
    const center=el.scrollTop+130;
    items.forEach(item=>{
      const top=item.offsetTop-104; // subtract spacer
      item.classList.toggle('selected',Math.abs(top+26-center)<28);
    });
  }

  function scrollPickerTo(id,val){
    const el=document.getElementById(id);
    el.scrollTop=val*52;
    highlightCol(el);
  }

  function getPickerVal(id){
    const el=document.getElementById(id);
    return Math.round(el.scrollTop/52);
  }

  function openPicker(currentSecs, callback){
    pickerCallback=callback;
    const h=Math.floor(currentSecs/3600);
    const m=Math.floor((currentSecs%3600)/60);
    const s=currentSecs%60;
    document.getElementById('picker-overlay').classList.add('open');
    document.getElementById('picker-sheet').classList.add('open');
    setTimeout(()=>{ scrollPickerTo('pick-h',h); scrollPickerTo('pick-m',m); scrollPickerTo('pick-s',s); },50);
  }

  function closePicker(){
    document.getElementById('picker-overlay').classList.remove('open');
    document.getElementById('picker-sheet').classList.remove('open');
  }

  function confirmPicker(){
    const h=getPickerVal('pick-h');
    const m=getPickerVal('pick-m');
    const s=getPickerVal('pick-s');
    const total=h*3600+m*60+s||60;
    if(pickerCallback) pickerCallback(total);
    closePicker();
  }

  function openPickerForStep(pillBtn){
    const stepEl=pillBtn.closest('.step-item');
    const current=parseInt(stepEl.dataset.secs)||60;
    openPicker(current,secs=>{
      stepEl.dataset.secs=secs;
      pillBtn.textContent=secsToLabel(secs);
    });
  }

  // ── RUNNER ───────────────────────────────────────
  function startRoutine(i){currentRoutine=routines[i];currentStep=0;showPage('runner');runStep();}

  function runStep(){
    if(!currentRoutine||currentStep>=currentRoutine.steps.length){showCompletion();return;}
    isPaused=false;
    const step=currentRoutine.steps[currentStep];
    timeLeft=totalTime=step.durationSecs||60;
    renderRunner(); startTimer();
  }

  function stepEmoji(name){
    const n=name.toLowerCase();
    if(n.includes('water')||n.includes('drink'))return'💧';
    if(n.includes('run')||n.includes('jog'))return'🏃';
    if(n.includes('walk'))return'🚶';
    if(n.includes('meditat')||n.includes('breath'))return'🧘';
    if(n.includes('read')||n.includes('book'))return'📚';
    if(n.includes('write')||n.includes('journal'))return'✍️';
    if(n.includes('eat')||n.includes('food')||n.includes('meal')||n.includes('breakfast'))return'🍳';
    if(n.includes('sleep')||n.includes('bed'))return'🛏';
    if(n.includes('shower')||n.includes('wash'))return'🚿';
    if(n.includes('coffee')||n.includes('tea'))return'☕';
    if(n.includes('exercise')||n.includes('workout')||n.includes('push'))return'💪';
    if(n.includes('stretch'))return'🤸';
    if(n.includes('study')||n.includes('focus'))return'🎯';
    return STEP_EMOJIS[Math.floor(Math.random()*STEP_EMOJIS.length)];
  }

  const CIR=2*Math.PI*116;

  function renderRunner(){
    const step=currentRoutine.steps[currentStep];
    const dots=currentRoutine.steps.map((_,i)=>`<div class="prog-dot ${i<currentStep?'done':i===currentStep?'current':''}"></div>`).join('');
    const label=secsToLabel(step.durationSecs||60);
    const emoji=stepEmoji(step.name);
    document.getElementById('runner-content').innerHTML=`
      <div class="runner-wrap">
        <div class="runner-topbar">
          <div class="runner-badge">Step ${currentStep+1} / ${currentRoutine.steps.length}</div>
          <button class="runner-close-btn" onclick="confirmStop()">✕</button>
        </div>
        <div class="runner-title">${step.name}</div>
        <div class="runner-subtitle">${currentRoutine.name} · ${label}</div>
        <div class="timer-outer">
          <div class="timer-glow"></div>
          <div class="timer-svg-wrap">
            <svg width="260" height="260" viewBox="0 0 260 260">
              <circle class="t-bg" cx="130" cy="130" r="116"/>
              <circle class="t-prog" id="t-prog" cx="130" cy="130" r="116" stroke-dasharray="${CIR}" stroke-dashoffset="0"/>
            </svg>
          </div>
          <div class="timer-center">
            <div class="timer-emoji-bg">${emoji}</div>
            <div class="timer-digits" id="t-digits">${formatTime(timeLeft)}</div>
            <div class="timer-dur-pill">${label}</div>
          </div>
        </div>
        <div class="runner-controls">
          <button class="ctrl-btn" onclick="prevStep()">
            <div class="ctrl-disk"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></div>
            Prev
          </button>
          <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">
            <div class="ctrl-disk main" id="pause-disk">
              <svg id="pause-icon" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </div>
            <span id="pause-lbl">Pause</span>
          </button>
          <button class="ctrl-btn" onclick="nextStep()">
            <div class="ctrl-disk"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
            Skip
          </button>
        </div>
        <div class="prog-dots">${dots}</div>
      </div>`;
  }

  function startTimer(){
    clearInterval(timer);
    timer=setInterval(()=>{
      if(isPaused)return;
      timeLeft--;
      const d=document.getElementById('t-digits'),p=document.getElementById('t-prog');
      if(d)d.textContent=formatTime(timeLeft);
      if(p)p.style.strokeDashoffset=CIR*(1-timeLeft/totalTime);
      if(timeLeft<=0){clearInterval(timer);currentStep++;runStep();}
    },1000);
  }

  function togglePause(){
    isPaused=!isPaused;
    const lbl=document.getElementById('pause-lbl');
    const icon=document.getElementById('pause-icon');
    const disk=document.getElementById('pause-disk');
    if(lbl)lbl.textContent=isPaused?'Resume':'Pause';
    if(icon)icon.innerHTML=isPaused?'<polygon points="6,3 20,12 6,21"/>':'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
    if(disk){disk.style.background=isPaused?'var(--yellow)':'var(--dark)';disk.style.color=isPaused?'var(--dark)':'white';}
  }

  function prevStep(){clearInterval(timer);if(currentStep>0)currentStep--;runStep();}
  function nextStep(){clearInterval(timer);currentStep++;runStep();}
  function confirmStop(){if(confirm('End routine?'))stopRunner();}
  function stopRunner(){clearInterval(timer);currentRoutine=null;showPage('home');}

  function showCompletion(){
    completions.push({routineName:currentRoutine.name,date:toDateStr(new Date()),ts:Date.now()});
    saveC();
    document.getElementById('runner-content').innerHTML=`
      <div class="completion-wrap">
        <div class="big-icon">🎉</div>
        <div class="confetti">✨🌟✨</div>
        <h2>All done!</h2>
        <p>You completed<br/><b>${currentRoutine.name}</b><br/>Great job staying on track!</p>
        <button class="btn-primary" style="max-width:280px" onclick="stopRunner()">Back to Routines</button>
      </div>`;
  }

  function formatTime(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;}

  // ── CALENDAR ─────────────────────────────────────
  function toDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  function changeMonth(dir){calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+dir,1);renderCalendar();}

  function renderCalendar(){
    const year=calViewDate.getFullYear(),month=calViewDate.getMonth(),todayStr=toDateStr(new Date());
    document.getElementById('cal-month-label').textContent=calViewDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const done=new Set(completions.map(c=>c.date));
    const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
    let g=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
    for(let i=0;i<firstDay;i++)g+=`<div class="cal-day empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      let cls='cal-day has-num';
      if(done.has(ds))cls+=' completed';
      if(ds===todayStr)cls+=' today';
      g+=`<div class="${cls}">${d}</div>`;
    }
    document.getElementById('cal-grid').innerHTML=g;
    const mk=`${year}-${String(month+1).padStart(2,'0')}`;
    const thisM=completions.filter(c=>c.date.startsWith(mk)).length;
    let streak=0;const chk=new Date();
    while(done.has(toDateStr(chk))){streak++;chk.setDate(chk.getDate()-1);}
    document.getElementById('cal-stats').innerHTML=`
      <div class="stat-card"><div class="stat-val"><span class="y">${streak}</span></div><div class="stat-lbl">🔥 Streak</div></div>
      <div class="stat-card"><div class="stat-val">${thisM}</div><div class="stat-lbl">📅 Month</div></div>
      <div class="stat-card"><div class="stat-val">${completions.length}</div><div class="stat-lbl">⭐ All Time</div></div>`;
    const recent=[...completions].reverse().slice(0,10);
    document.getElementById('cal-log').innerHTML=recent.length?recent.map(c=>{
      const label=new Date(c.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      const r=routines.find(r=>r.name===c.routineName);
      return`<div class="log-item"><div class="log-left"><div class="log-icon">${r?.emoji||'🌟'}</div><div><div class="log-name">${c.routineName}</div><div class="log-date">${label}</div></div></div><div class="log-badge">✓ Done</div></div>`;
    }).join(''):`<div class="empty" style="padding:30px 0"><h3>No completions yet</h3><p>Complete a routine to track progress.</p></div>`;
  }

  // INIT
  initPicker();
  renderRoutines();
</script>
</body>
</html>
